name: Build Job
on: 
  push:
    branches: 
      - main

  pull_request:
    branches: ["main"]

  workflow_dispatch:

  schedule:
    - cron: '10 14 * * *' # Runs every day at midnight

permissions:
  contents: read

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Maven Build
        run: mvn install

      - name: Upload Build Artifact (WAR)
        uses:  actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war

      - name: Notify if Build fails
        if: failure()
        run: echo "Build failed! Please check the logs for details."



  Testing:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run tests on main branch
        if : github.ref == 'refs/heads/main'
        run: mvn test
    

      - name: Checkstyle
        run: mvn checkstyle:checkstyle

      - name: Run test on other branches
        if : github.ref != 'refs/heads/main'
        run: echo "Tests are only run on the main branch. Skipping tests for this branch."

  Security_Scan:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'filesystem'
          scan-ref: .
          format: json
          exit-code: 0
          vuln-type: 'os, library'
          output: trivy-results.json

      - name: Upload Trivy Scan result as artifact 
        uses:  actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.json